
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pandas (Series) console</title>
  <link href="./styles.css" rel="stylesheet" />
</head>

<body>

  <h1>Pandas (Series) console</h1>

  <form name="editor">
    <table>
      <tbody>
        <tr>
          <td id="buttons">
            <div>

<h2>Import modules</h2>

<p>
  <input type="button" class="btn btn-module" value="pandas" onclick="document.editor.textbox.value+='\nimport pandas as pd'" />
  <input type="button" class="btn btn-module" value="numpy" onclick="document.editor.textbox.value+='\nimport numpy as np'" />
  <input type="button" class="btn btn-module" value="version" onclick="document.editor.textbox.value+='\nprint(np.__version__)'" />
</p>

<hr />
<h2>pandas.Series object</h2>

<p>
  <input type="button" class="btn btn-success" value="pd.Series" onclick="series();" />
  <input class="btn" name="array" id="array" placeholder="array" size="10" type="textfield" />
  <input class="btn" name="variable" id="variable" placeholder="variable name" size="10" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="create from object" onclick="createFromObject();" />
  <input type="button" class="btn btn-success" value="create from list" onclick="createFromList();" />
  <input type="button" class="btn btn-success" value="create from series" onclick="createFromSeries();" />
</p>

<p>
  <input type="button" class="btn btn-success" value="index" onclick="seriesProperties(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="name" onclick="nameSeries(this.value);" />
  <input class="btn" name="value" id="value" placeholder="value" type="textfield" />
  <input type="button" class="btn btn-success" value="copy" onclick="copy(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="values" onclick="seriesProperties(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="access" onclick="access();" />
  <input class="btn" name="index" id="index" placeholder="index" type="number" />
</p>

<p>
  <input type="button" class="btn btn-success" value="range" onclick="range();" />
</p>

<p>
  <input class="btn" name="start" id="start" placeholder="start" type="number" />
  <input class="btn" name="end" id="end" placeholder="end" type="number" />
  <input class="btn" name="step" id="step" placeholder="step" type="number" />
</p>

<p>
  <input type="button" class="btn btn-success" value="sort" onclick="statistics(this.value);" />
</p>

<hr />
<h2>Array Type</h2>

<p>
  <input type="button" class="btn btn-success" value="dtype" onclick="dtype();" />
  <input type="button" class="btn btn-success" value="float" onclick="dtype(this.value);" />
</p>

<hr />
<h2>Assigning</h2>

<p>
  <input type="button" class="btn btn-primary" value="assign element" onclick="assignSeries();" />
</p>

<p>
  <input class="btn" name="assignIndexValue" id="assignIndexValue" placeholder="index" type="textfield" />
  <input class="btn" name="assignValue" id="assignValue" placeholder="value" type="number" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="assign range" onclick="assignRangeSeries()" />
  <input class="btn" name="start" id="assignRangeStart" placeholder="start" type="number" />
  <input class="btn" name="end" id="assignRangeEnd" placeholder="end" type="number" />
</p>

<hr />
<h2>Indexing</h2>

<p>
  <input type="button" class="btn btn-primary" value="access" onclick="accessSeries();" />
  <input class="btn" name="index" id="indexSeries" placeholder="index" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="iloc" onclick="accessIloc(this.value);" />
  <input class="btn" name="ilocIndexStart" id="ilocIndexStart" placeholder="index start" type="number" />
  <input class="btn" name="ilocIndexEnd" id="ilocIndexEnd" placeholder="index end" type="number" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="assign" onclick="assignIndex();" />
  <input class="btn" name="indexAssign" id="indexAssign" placeholder="new index" type="textfield" />
</p>

<hr />
<h2>Slicing</h2>

<p>
  <input type="button" class="btn btn-primary" value="slice" onclick="sliceRange();" />
  <input class="btn" name="indexSeriesRangeOne" id="indexSeriesRangeOne" placeholder="range one" type="textfield" />
  <input class="btn" name="indexSeriesRangeTwo" id="indexSeriesRangeTwo" placeholder="range two" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="range" onclick="rangeMatrix();" />
  <input type="button" class="btn btn-primary" value="slice" onclick="sliceMatrix();" />
</p>

<p>
  <input class="btn" name="startMatrix" id="startMatrix" placeholder="start" type="number" />
  <input class="btn" name="endMatrix" id="endMatrix" placeholder="end" type="number" />
  <input class="btn" name="beforeMatrix" id="beforeMatrix" placeholder="before" type="number" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="reverse" onclick="rangeMatrixReverse();" />
  <input type="button" class="btn btn-primary" value="odd" onclick="rangeMatrixOdd();" />
</p>

<hr />
<h2>Sorting</h2>

<p>
  <input type="button" class="btn btn-primary" value="sort_values" onclick="sort(this.value);" />
</p>

<hr />
<h2>Summary statistics</h2>

<p>
  <input type="button" class="btn btn-data" value="log" onclick="log(this.value);" />
  <input type="button" class="btn btn-data" value="max" onclick="statistics(this.value);" />
  <input type="button" class="btn btn-data" value="mean" onclick="statistics(this.value);" />
  <input type="button" class="btn btn-data" value="std" onclick="statistics(this.value);" />
  <input type="button" class="btn btn-data" value="sum" onclick="statistics(this.value);" />
  <input type="button" class="btn btn-data" value="var" onclick="statistics(this.value);" />
</p>

<p>
  <input class="btn" name="axis" id="axis" placeholder="axis" type="number" />
</p>

<hr />
<h2>Broadcasting and vectorised operations</h2>

<p>
  <input type="button" class="btn btn-primary" value="+" onclick="operation(this.value);" />
  <input type="button" class="btn btn-primary" value="+=" onclick="operation(this.value);" />
  <input type="button" class="btn btn-primary" value="-" onclick="operation(this.value)" />
  <input type="button" class="btn btn-primary" value="-=" onclick="operation(this.value)" />
  <input type="button" class="btn btn-primary" value="*" onclick="operation(this.value)" />
  <input type="button" class="btn btn-primary" value="*=" onclick="operation(this.value)" />
  <input type="button" class="btn btn-primary" value="/" onclick="operation(this.value)" />
  <input type="button" class="btn btn-primary" value="/=" onclick="operation(this.value)" />
</p>

<p>
  <input class="btn" name="broadcastNumber" id="broadcastNumber" placeholder="value" type="number" />
</p>

<hr />
<h2>Boolean series (masks)</h2>

<p>
  <input type="button" class="btn btn-primary" value=">" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value=">=" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value="<" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value="<=" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value="==" onclick="boolean(this.value);" />
  <input type="button" class="btn btn-primary" value="!=" onclick="boolean(this.value);" />
</p>

<p>
  <input class="btn" name="valueA" id="valueA" placeholder="condition A" size="10" type="textfield" />
  <input class="btn" name="valueB" id="valueB" placeholder="condition B" size="10" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="&" onclick="masks(this.value);" />
  <input type="button" class="btn btn-primary" value="|" onclick="masks(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="start True" onclick="truthy('True');" />
  <input type="button" class="btn btn-primary" value="start False" onclick="truthy('False');" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="@ True" onclick="document.editor.textbox.value+=', True'" />
  <input type="button" class="btn btn-primary" value="@ False" onclick="document.editor.textbox.value+=', False'" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="last True" onclick="document.editor.textbox.value+=', True]\n'" />
  <input type="button" class="btn btn-primary" value="last False" onclick="document.editor.textbox.value+=', False]\n'" />
</p>

<hr />
<h2>Modifying series</h2>

<p>
  <input type="button" class="btn btn-primary" value="modify" onclick="modifySeries();" />
  <input class="btn" name="modifyElement" id="modifyElement" placeholder="element" size="10" type="textfield" />
  <input class="btn" name="modifyValue" id="modifyValue" placeholder="value" type="number" />
</p>

<p>
  <input type="button" class="btn btn-primary" value=">" onclick="modifyBoolean(this.value);" />
  <input type="button" class="btn btn-primary" value=">=" onclick="modifyBoolean(this.value);" />
  <input type="button" class="btn btn-primary" value="<" onclick="modifyBoolean(this.value);" />
  <input type="button" class="btn btn-primary" value="<=" onclick="modifyBoolean(this.value);" />
</p>

<p>
  <input class="btn" name="modifyIndex" id="modifyIndex" placeholder="index" size="10" type="number" />
</p>

</div>
          </td>
          <td id="textbox">
            <textarea id="preview" name="textbox"></textarea>
          </td>
          <td id="empty">
          </td>
        </tr>
      </tbody>
    </table>
  </form>

<script src="./script.js"></script>

</body>
</html>
