
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pandas (Series) console</title>
  <link href="./styles.css" rel="stylesheet" />
</head>

<body>

  <h1>Pandas (Series) console</h1>

  <form name="editor">
    <table>
      <tbody>
        <tr>
          <td id="buttons">
            <div>

<h2>Import modules</h2>

<p>
  <input type="button" class="btn btn-module" value="pandas" onclick="document.editor.textbox.value+='\nimport pandas as pd'" />
  <input type="button" class="btn btn-module" value="numpy" onclick="document.editor.textbox.value+='\nimport numpy as np'" />
  <input type="button" class="btn btn-module" value="version" onclick="document.editor.textbox.value+='\nprint(np.__version__)'" />
</p>

<hr />
<h2>pandas.Series object</h2>

<p>
  <input type="button" class="btn btn-success" value="pd.Series" onclick="series();" />
  <input class="btn" name="array" id="array" placeholder="array" size="10" type="textfield" />
  <input class="btn" name="variable" id="variable" placeholder="variable name" size="10" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-success" value="create from object" onclick="createFromObject();" />
  <input type="button" class="btn btn-success" value="create from list" onclick="createFromList();" />
  <input type="button" class="btn btn-success" value="create from series" onclick="createFromSeries();" />
</p>

<p>
  <input type="button" class="btn btn-success" value="index" onclick="seriesProperties(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="name" onclick="nameSeries(this.value);" />
  <input class="btn" name="value" id="value" placeholder="value" type="textfield" />
  <input type="button" class="btn btn-success" value="copy" onclick="copy(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="values" onclick="seriesProperties(this.value);" />
</p>

<p>
  <input type="button" class="btn btn-success" value="access" onclick="access();" />
  <input class="btn" name="index" id="index" placeholder="index" type="number" />
</p>

<p>
  <input type="button" class="btn btn-success" value="range" onclick="range();" />
</p>

<p>
  <input class="btn" name="start" id="start" placeholder="start" type="number" />
  <input class="btn" name="end" id="end" placeholder="end" type="number" />
  <input class="btn" name="step" id="step" placeholder="step" type="number" />
</p>

<p>
  <input type="button" class="btn btn-success" value="sort" onclick="statistics(this.value);" />
</p>

<hr />
<h2>Array Type</h2>

<p>
  <input type="button" class="btn btn-success" value="dtype" onclick="dtype();" />
  <input type="button" class="btn btn-success" value="float" onclick="dtype(this.value);" />
</p>

<hr />
<h2>Assigning</h2>

<p>
  <input type="button" class="btn btn-primary" value="assign element" onclick="assignSeries();" />
</p>

<p>
  <input class="btn" name="assignIndexValue" id="assignIndexValue" placeholder="index" type="textfield" />
  <input class="btn" name="assignValue" id="assignValue" placeholder="value" type="number" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="assign range" onclick="assignRangeSeries()" />
  <input class="btn" name="start" id="assignRangeStart" placeholder="start" type="number" />
  <input class="btn" name="end" id="assignRangeEnd" placeholder="end" type="number" />
</p>

<hr />
<h2>Indexing</h2>

<p>
  <input type="button" class="btn btn-primary" value="access" onclick="accessSeries();" />
  <input class="btn" name="index" id="indexSeries" placeholder="index" type="textfield" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="iloc" onclick="accessIloc(this.value);" />
  <input class="btn" name="ilocIndexStart" id="ilocIndexStart" placeholder="index start" type="number" />
  <input class="btn" name="ilocIndexEnd" id="ilocIndexEnd" placeholder="index end" type="number" />
</p>

<p>
  <input type="button" class="btn btn-primary" value="assign" onclick="assignIndex();" />
</p>

            </div>
          </td>
          <td id="textbox">
            <textarea id="preview" name="textbox"></textarea>
          </td>
          <td id="empty">
          </td>
        </tr>
      </tbody>
    </table>
  </form>

<script src="./script.js"></script>

</body>
</html>
